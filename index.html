<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Chanda! ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #d4a373; /* Gold tone */
            --secondary: #faedcd;
            --accent: #e09f3e;
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: var/(--text);
            overflow: hidden;
            height: 100vh;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            transition: all 0.8s ease-in-out;
        }

        .active { display: flex; animation: fadeIn 1.2s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        /* Hero Text Styles */
        .hero-name {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            background: linear-gradient(to right, #f3e5ab, #e09f3e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Buttons Styling */
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 30px; }
        
        button {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 8px;
        }

        button:hover { transform: translateY(-5px); background: #fff; box-shadow: 0 10px 20px rgba(224, 159, 62, 0.3); }

        /* Page 1: Cake & Banner */
        .banner {
            position: absolute; top: -120px; left: 50%;
            transform: translateX(-50%);
            background: #e09f3e; color: #fff;
            padding: 15px 50px; border-radius: 0 0 30px 30px;
            font-weight: bold; transition: 1.2s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .cake-container { margin: 30px; font-size: 100px; display: none; position: relative; }
        .candle-flame { 
            position: absolute; top: 0px; left: 50%; transform: translateX(-50%);
            width: 18px; height: 30px; background: #ffd700; border-radius: 50%;
            filter: blur(1px); animation: flicker 0.1s infinite alternate;
            box-shadow: 0 0 20px #ffaa00;
        }

        @keyframes flicker { from { opacity: 0.7; transform: translateX(-50%) scale(1); } to { opacity: 1; transform: translateX(-50%) scale(1.1); } }

        /* Page 2: 3D Card */
        .gift-card { width: 220px; height: 280px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .gift-card.open .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-front { background: #fff; font-size: 80px; box-shadow: inset 0 0 20px rgba(224, 159, 62, 0.2); }
        .card-back { background: #fff; color: #333; transform: rotateY(180deg); padding: 25px; font-weight: 400; line-height: 1.6; }

        /* Page 3: 3D Gallery */
        .gallery-container { height: 350px; perspective: 1200px; display: flex; align-items: center; justify-content: center; width: 100%; }
        .carousel { width: 180px; height: 240px; position: relative; transform-style: preserve-3d; animation: rotate 25s infinite linear; }
        .carousel div {
            position: absolute; width: 180px; height: 240px;
            border: 4px solid white; border-radius: 15px;
            background-size: cover; background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .carousel div:nth-child(1) { transform: rotateY(0deg) translateZ(280px); }
        .carousel div:nth-child(2) { transform: rotateY(72deg) translateZ(280px); }
        .carousel div:nth-child(3) { transform: rotateY(144deg) translateZ(280px); }
        .carousel div:nth-child(4) { transform: rotateY(216deg) translateZ(280px); }
        .carousel div:nth-child(5) { transform: rotateY(288deg) translateZ(280px); }

        @keyframes rotate { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }

        /* Hearts and Particles */
        .heart { position: absolute; color: #e09f3e; opacity: 0.4; animation: float 5s linear infinite; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); } 100% { transform: translateY(-10vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="page1" class="page active">
        <div id="banner" class="banner">HAPPY BIRTHDAY CHANDA! 🌙✨</div>
        <h1 class="hero-name">Chanda 🎉🎂</h1>
        <p style="letter-spacing: 1px; opacity: 0.9;">Today is all about you and your beautiful smile ❤️</p>
        
        <div id="cake" class="cake-container">
            🎂
            <div id="flame" class="candle-flame"></div>
        </div>

        <div class="btn-group">
            <button onclick="toggleBanner()"><i data-lucide="flag"></i> Banner</button>
            <button onclick="releaseBalloons()"><i data-lucide="party-popper"></i> Balloons</button>
            <button onclick="showCake()"><i data-lucide="cake"></i> Show Cake</button>
            <button onclick="celebrate()"><i data-lucide="sparkles"></i> Celebrate</button>
        </div>

        <button id="blowBtn" style="display:none; margin-top: 25px; background: #e09f3e; color: white;" onclick="blowCandle()">
            Blow the Candles 🕯️
        </button>
        <button id="next1" style="display:none; margin-top: 25px;" onclick="nextPage(2)">
            Next Surprise ➜
        </button>
    </div>

    <div id="page2" class="page">
        <div class="glass-card">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3N2amxqZ3pnbmt3ZzNiaTZ4bm52bjFpdmN1emR4a2V2YmU4c2t5ZiZlcD12MV9pbnRlcm5hbV9naWZfYnlfaWQmY3Q9Zw/m9u8iGvYl0oU0/giphy.gif" alt="Surprise" style="width:100%; border-radius: 20px; margin-bottom: 25px;">
            <div class="gift-card" onclick="this.classList.toggle('open')">
                <div class="card-inner">
                    <div class="card-front">🎁</div>
                    <div class="card-back">
                        <p><strong>Dearest Chanda,</strong><br><br>You are the most special gift in this world. May your life be filled with as much light as your name brings to the night sky. ❤️</p>
                    </div>
                </div>
            </div>
            <button style="margin: 30px auto;" onclick="nextPage(3)">Open Memory Gallery ➜</button>
        </div>
    </div>

    <div id="page3" class="page" style="background: radial-gradient(circle, #2d2d2d 0%, #111 100%);">
        <h2 style="margin-bottom: 50px; font-weight: 300;">Sweet Memories</h2>
        <div class="gallery-container">
            <div class="carousel">
                <div style="background-image: url('https://picsum.photos/200/300?sig=1');"></div>
                <div style="background-image: url('https://picsum.photos/200/300?sig=2');"></div>
                <div style="background-image: url('https://picsum.photos/200/300?sig=3');"></div>
                <div style="background-image: url('https://picsum.photos/200/300?sig=4');"></div>
                <div style="background-image: url('https://picsum.photos/200/300?sig=5');"></div>
            </div>
        </div>
        <button style="margin-top: 60px;" onclick="nextPage(4)">Final Message ➜</button>
    </div>

    <div id="page4" class="page">
        <div class="glass-card" style="text-align: left;">
            <h2 style="font-family: 'Dancing Script'; font-size: 3rem; margin-bottom: 15px; color: #e09f3e;">To Chanda...</h2>
            <div id="typing-text" style="line-height: 1.8; font-size: 1.1rem; min-height: 180px;"></div>
            <button style="margin-top: 30px; width: 100%; justify-content: center;" onclick="location.reload()">With Love ❤️</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            if(num === 4) startTyping();
            if(num === 4) createHearts();
        }

        function toggleBanner() {
            const b = document.getElementById('banner');
            b.style.top = b.style.top === '0px' ? '-120px' : '0px';
        }

        function releaseBalloons() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 }, colors: ['#e09f3e', '#ffffff', '#f3e5ab'] });
        }

        function showCake() {
            document.getElementById('cake').style.display = 'block';
            document.getElementById('blowBtn').style.display = 'flex';
        }

        function celebrate() {
            const end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#e09f3e', '#fff'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#e09f3e', '#fff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function blowCandle() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('blowBtn').style.display = 'none';
            document.getElementById('next1').style.display = 'flex';
            confetti({ particleCount: 50, scalar: 2, shapes: ['star'] });
        }

        const msg = "On your special day, Chanda, I just want to say how grateful I am to have you in my life. You deserve endless happiness, love, and success. May your year be as bright and beautiful as the moon you are named after. \n\nHappy Birthday once again chanda (my love)! 🌙🎂❤️";
        
        function startTyping() {
            const container = document.getElementById('typing-text');
            let i = 0;
            container.innerHTML = "";
            function type() {
                if (i < msg.length) {
                    container.innerHTML += msg.charAt(i) === '\n' ? '<br>' : msg.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
        }

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = "❤️";
                heart.className = "heart";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = (Math.random() * 20 + 10) + "px";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 400);
        }
    </script>
</body>
</html>
